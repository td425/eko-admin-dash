<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#04060c" />
    <meta name="description" content="EKO - Command Center" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="./manifest.json" media="(prefers-color-scheme: light)" data-scheme="light" />
    <link rel="manifest" href="./manifest-dark.json" media="(prefers-color-scheme: dark)" data-scheme="dark" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <title>EKO - Command Center</title>
    <style>
      :root {
        color-scheme: dark;
        --eko-orange: #ff7a1a;
        --eko-orange-bright: #ff9d4d;
        --eko-bg: #04060c;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--eko-bg);
        font-family: "Inter", "Work Sans", system-ui, sans-serif;
      }

      .layout {
        min-height: 90vh !important;
        height: 90vh;
      }

      /* Sci-fi HUD boot loader */
      .loader-container {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
        overflow: hidden;
        color: var(--eko-orange);
        background: radial-gradient(ellipse 120% 90% at 50% -10%, #112143 0%, #0a1020 45%, #04060c 100%);
      }

      /* Perspective neon grid floor */
      .loader-container::before {
        content: "";
        position: absolute;
        left: -50%;
        right: -50%;
        bottom: 0;
        height: 65%;
        background-image:
          linear-gradient(rgba(255, 122, 26, 0.18) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 122, 26, 0.18) 1px, transparent 1px);
        background-size: 60px 60px;
        transform: perspective(420px) rotateX(70deg);
        transform-origin: 50% 100%;
        -webkit-mask-image: linear-gradient(to top, #000 0%, transparent 75%);
        mask-image: linear-gradient(to top, #000 0%, transparent 75%);
        animation: gridScroll 5s linear infinite;
        pointer-events: none;
      }

      /* Scanlines + vignette */
      .loader-container::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.16) 0,
          rgba(0, 0, 0, 0.16) 1px,
          transparent 1px,
          transparent 3px
        );
        box-shadow: inset 0 0 220px rgba(0, 0, 0, 0.85);
      }

      .loader-container.fade-out {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }

      .hud {
        position: relative;
        z-index: 1;
        width: 170px;
        height: 170px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .hud-ring {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255, 122, 26, 0.12);
      }

      .hud-ring-outer {
        width: 170px;
        height: 170px;
        border-top-color: var(--eko-orange);
        border-right-color: var(--eko-orange);
        box-shadow: 0 0 18px rgba(255, 122, 26, 0.25);
        animation: spin 2.4s linear infinite;
      }

      .hud-ring-mid {
        width: 120px;
        height: 120px;
        border-bottom-color: var(--eko-orange);
        border-left-color: var(--eko-orange-bright);
        animation: spinRev 1.8s linear infinite;
      }

      .hud-ticks {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: repeating-conic-gradient(
          from 0deg,
          rgba(255, 122, 26, 0.5) 0deg 2deg,
          transparent 2deg 30deg
        );
        -webkit-mask: radial-gradient(transparent 64px, #000 65px);
        mask: radial-gradient(transparent 64px, #000 65px);
        animation: spin 8s linear infinite;
      }

      .hud-core {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 122, 26, 0.9) 0%,
          rgba(255, 122, 26, 0.15) 70%,
          transparent 100%
        );
        box-shadow: 0 0 24px rgba(255, 122, 26, 0.7);
        animation: pulseCore 1.6s ease-in-out infinite;
      }

      .hud-bar {
        position: relative;
        z-index: 1;
        width: 300px;
        max-width: 70vw;
        height: 6px;
        border: 1px solid rgba(255, 122, 26, 0.4);
        background: rgba(255, 122, 26, 0.05);
        border-radius: 3px;
        overflow: hidden;
      }

      .hud-bar span {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 38%;
        border-radius: 3px;
        background: linear-gradient(90deg, transparent, var(--eko-orange), var(--eko-orange-bright), var(--eko-orange), transparent);
        box-shadow: 0 0 12px rgba(255, 122, 26, 0.7);
        animation: barSlide 1.6s ease-in-out infinite;
      }

      .hud-status {
        z-index: 1;
        font-size: 0.78rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: #ffb877;
        text-shadow: 0 0 12px rgba(255, 122, 26, 0.5);
        animation: blink 1.6s steps(1) infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spinRev {
        to {
          transform: rotate(-360deg);
        }
      }
      @keyframes pulseCore {
        0%,
        100% {
          transform: scale(0.85);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.1);
          opacity: 1;
        }
      }
      @keyframes barSlide {
        0% {
          left: -40%;
        }
        100% {
          left: 100%;
        }
      }
      @keyframes gridScroll {
        0% {
          background-position: 0 0;
        }
        100% {
          background-position: 0 60px;
        }
      }
      @keyframes blink {
        0%,
        70% {
          opacity: 1;
        }
        71%,
        100% {
          opacity: 0.45;
        }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="loader" class="loader-container">
      <div class="hud">
        <div class="hud-ticks"></div>
        <div class="hud-ring hud-ring-outer"></div>
        <div class="hud-ring hud-ring-mid"></div>
        <div class="hud-core"></div>
      </div>
      <div class="hud-bar"><span></span></div>
      <div class="hud-status">Establishing secure connection</div>
    </div>
    <span id="js-version" style="display: none"></span>
    <script type="module" src="/src/index.tsx"></script>
  </body>
  <script>
    const mediaQuery = window.matchMedia("(prefers-color-scheme: dark)");
    const schemeLinks = {
      light: document.querySelector('link[rel="manifest"][data-scheme="light"]'),
      dark: document.querySelector('link[rel="manifest"][data-scheme="dark"]'),
    };
    const schemeHrefs = {
      light: schemeLinks.light?.getAttribute("href"),
      dark: schemeLinks.dark?.getAttribute("href"),
    };

    const ensureManifestLink = () => {
      let active = document.querySelector('link[rel="manifest"][data-active="true"]');
      if (!active) {
        active = document.createElement("link");
        active.setAttribute("rel", "manifest");
        active.setAttribute("data-active", "true");
        document.head.appendChild(active);
      }
      return active;
    };

    const updateManifest = () => {
      const nextHref = mediaQuery.matches ? schemeHrefs.dark : schemeHrefs.light;
      if (!nextHref) return;
      const active = ensureManifestLink();
      active.setAttribute("href", nextHref);
    };

    updateManifest();
    schemeLinks.light?.remove();
    schemeLinks.dark?.remove();
    if (typeof mediaQuery.addEventListener === "function") {
      mediaQuery.addEventListener("change", updateManifest);
    } else if (typeof mediaQuery.addListener === "function") {
      mediaQuery.addListener(updateManifest);
    }
    document.getElementById("js-version").textContent = __KETESA_VERSION__;
  </script>
</html>
